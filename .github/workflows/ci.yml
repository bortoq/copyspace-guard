name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Static checks
        run: |
          ruff check --no-cache .
          python -m mypy src
      - name: Unit and CLI tests
        run: |
          coverage run -m unittest discover -s tests -v
          coverage report --fail-under=80
          coverage xml -o coverage.xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
      - name: CLI smoke
        run: |
          copyspace-guard doctor --root .
          copyspace-guard doctor --root . --json
          copyspace-guard analyze \
            --csv examples/ring15.csv \
            --bw 256 \
            --roi examples/roi.yml \
            --summary-only \
            --outdir artifacts/ci-smoke
          copyspace-guard gate artifacts/ci-smoke/summary.json \
            --config examples/copyspace_guard.yml
      - name: READ1_WRITE1 smoke
        run: |
          copyspace-guard analyze \
            --csv examples/ring15.csv \
            --bw 256 \
            --model READ1_WRITE1 \
            --summary-only \
            --outdir artifacts/ci-readwrite
      - name: Performance smoke
        run: copyspace-guard bench-suite --outdir artifacts/ci-bench-suite --max-total-seconds 30

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Build sdist/wheel
        run: |
          python -m pip install -e ".[dev]"
          python -m build --no-isolation
      - name: Wheel install smoke
        run: |
          python -m venv /tmp/csg-wheel-smoke
          /tmp/csg-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/csg-wheel-smoke/bin/copyspace-guard analyze \
            --csv examples/ring15.csv \
            --bw 256 \
            --summary-only \
            --outdir /tmp/csg-wheel-smoke/out

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Static security scan
        run: python -m bandit -q -r src tools
      - name: Dependency vulnerability scan
        run: python -m pip_audit --progress-spinner off

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -t copyspace-guard .
      - name: Docker run smoke
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -v "$PWD:/work" copyspace-guard analyze \
            --csv examples/ring15.csv \
            --bw 256 \
            --summary-only \
            --outdir artifacts/docker-smoke
