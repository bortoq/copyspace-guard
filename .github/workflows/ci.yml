name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_property:
        description: Run the property-based test suite
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '17 3 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Fast test suite
        run: make test-fast
      - name: Coverage XML
        env:
          COVERAGE_FILE: artifacts/.coverage
        run: python -m coverage xml -o coverage.xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  property-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Property smoke
        run: make property-smoke

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Static checks
        run: |
          python -m ruff check --no-cache .
          python -m mypy src
          python -m compileall -q src tests
      - name: Core smoke tests
        run: |
          python -m unittest tests.test_core tests.test_cli.BuildContractTests -v
          python -m unittest tests.test_cli.SecurityCliTests.test_outdir_path_traversal_rejected -v
          python -m unittest tests.test_cli.SecurityCliTests.test_outdir_path_traversal_with_symlink_rejected -v
      - name: CLI smoke
        run: |
          copyspace-guard doctor --root .
          copyspace-guard doctor --root . --json
          copyspace-guard analyze --csv examples/ring15.csv --bw 256 --roi examples/roi.yml --summary-only --outdir artifacts/windows-smoke
          copyspace-guard gate artifacts/windows-smoke/summary.json --config examples/copyspace_guard.yml
      - name: READ1_WRITE1 smoke
        run: copyspace-guard analyze --csv examples/ring15.csv --bw 256 --model READ1_WRITE1 --summary-only --outdir artifacts/windows-readwrite

  property-nightly:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_property) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Property tests
        run: make property

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Build sdist/wheel
        run: |
          python -m pip install -e ".[dev]"
          python -m build --no-isolation
      - name: Wheel install smoke
        run: make wheel-smoke

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Security checks
        run: make security

  performance-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Performance smoke
        run: copyspace-guard bench-suite --outdir artifacts/ci-bench-suite --max-total-seconds 60

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build Docker image
        run: docker build -t copyspace-guard .
      - name: Docker run smoke
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -v "$PWD:/work" copyspace-guard analyze \
            --csv examples/ring15.csv \
            --bw 256 \
            --summary-only \
            --outdir artifacts/docker-smoke
