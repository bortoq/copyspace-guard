name: Dependabot automerge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge-github-actions:
    if: >
      github.actor == 'dependabot[bot]' &&
      contains(github.event.pull_request.labels.*.name, 'github_actions')
    runs-on: ubuntu-latest
    steps:
      - name: Approve Dependabot PR
        run: gh pr review "$PR_URL" --approve --body "Auto-approving GitHub Actions dependency update after CI passes."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}

      - name: Enable squash auto-merge
        run: gh pr merge "$PR_URL" --squash --auto --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
