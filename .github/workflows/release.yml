name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Release version guard
        if: startsWith(github.ref, 'refs/tags/')
        run: python tools/release_version.py check --tag "${{ github.ref_name }}"

      - name: Release checks
        run: make production-check

      - name: Docker smoke
        run: |
          docker build -t copyspace-guard:${{ github.ref_name }} .
          docker run --rm --user "$(id -u):$(id -g)" -v "$PWD:/work" copyspace-guard:${{ github.ref_name }} analyze \
            --csv examples/ring15.csv \
            --bw 256 \
            --summary-only \
            --outdir artifacts/release-docker-smoke

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/release_manifest.csv
            dist/sbom.cdx.json

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/release_manifest.csv
            dist/sbom.cdx.json

  pypi-publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Select package distributions
        run: |
          mkdir -p dist-pypi
          cp dist/*.whl dist/*.tar.gz dist-pypi/

      - name: Publish package distributions to PyPI
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-pypi
